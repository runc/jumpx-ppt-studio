# Jumpx Slides · 单机启动
#   SKILL_URL=<ai-slide-producer release zip 的 URL> docker compose up --build
#   打开 http://localhost:5180
#
# 前置：① backend/.env 已填火山方舟 base_url/api_key（见 backend/.env.example）
#       ② 设环境变量 SKILL_URL = ai-slide-producer 发布 zip 的 URL（构建时拉进镜像）。
#          镜像自包含——部署机不需要再单独有 jumpx-ppt-slides-skill 仓库。
services:
  jumpx-slides:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # skill 的固定版本 release zip URL（GitHub release / R2 / 任意静态托管）
        SKILL_URL: ${SKILL_URL:?请设置 SKILL_URL=skill 发布 zip 的 URL}
    image: jumpx-slides:latest
    ports:
      - "5180:5180"
    env_file:
      - backend/.env
    volumes:
      # 产物 + 配方持久化（runs/ recipes/ 跨重启保留）
      - jumpx-workspace:/app/backend/workspace
    restart: unless-stopped

volumes:
  jumpx-workspace:
